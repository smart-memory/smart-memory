name: Publish smartmemory to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine hatchling

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to Test PyPI
        if: github.event.inputs.test_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: github.event.inputs.test_pypi != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Test installation
        if: github.event.inputs.test_pypi != 'true'
        run: |
          sleep 60
          python -m venv test-env
          source test-env/bin/activate
          pip install smartmemory --no-cache-dir
          smartmemory --help
          deactivate

      - name: Notify Discord
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "No webhook configured, skipping"; exit 0; fi
          python3 - << 'PY'
          import json, os, sys, urllib.request, urllib.error
          webhook = os.environ["DISCORD_WEBHOOK"]
          status = os.environ.get("STATUS", "").lower()
          repo = os.environ["REPO"]
          run_url = os.environ["RUN_URL"]
          emoji, color = ("✅", 3066993) if status == "success" else ("⚪", 9807270) if status == "cancelled" else ("❌", 15158332)
          desc = "" if status == "success" else run_url
          payload = json.dumps({"embeds": [{"title": f"{emoji} {repo}", "description": desc, "color": color}]}).encode()
          try:
              req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json"})
              urllib.request.urlopen(req, timeout=10)
              print("Discord notification sent")
          except Exception as e:
              print(f"Discord notification failed (non-fatal): {e}", file=sys.stderr)
          PY
